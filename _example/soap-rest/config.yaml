apiVersion: core/v1
kind: Entrypoint
spec:
  defaultLogger:
    apiVersion: core/v1
    kind: SLogger
  runners:
    - apiVersion: core/v1
      kind: HTTPServer
      name: reverseProxyServer

---
apiVersion: core/v1
kind: HTTPServer
metadata:
  name: reverseProxyServer
spec:
  addr: "localhost:8000"
  virtualHosts:
    - hosts: []
      middleware:
        - apiVersion: app/v1
          kind: SOAPRESTMiddleware
      handlers:
        - handler:
            apiVersion: core/v1
            kind: ReverseProxyHandler

---
apiVersion: core/v1
kind: ReverseProxyHandler
spec:
  loadBalancers:
    - pathMatcher:
        match: ".*"
        matchType: Regex
      upstreams:
        - url: http://localhost:8080/

---
apiVersion: core/v1
kind: SLogger
spec:
  level: Debug

---
apiVersion: app/v1
kind: SOAPRESTMiddleware
spec:
  matcher:
    patterns: ["/soap/apiA"]
    matchType: Exact
  extractStringElement: true
  extractBooleanElement: true
  extractIntegerElement: true
  extractFloatElement: true